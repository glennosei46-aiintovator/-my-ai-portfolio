<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glenn AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f19;
    color: white;
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 220px;
    background: #111827;
    padding: 15px;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    border-bottom: 1px solid #1f2937;
    text-align: center;
    font-weight: bold;
}

.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.msg {
    max-width: 70%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    line-height: 1.4;
}

.user {
    background: #4f46e5;
    margin-left: auto;
    text-align: right;
}

.bot {
    background: #1f2937;
}

.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #1f2937;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    background: #111827;
    color: white;
}

button {
    padding: 12px;
    background: #4f46e5;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>🤖 Glenn AI</h3>
    <p style="font-size:12px;color:#9ca3af;">
        Your personal AI assistant
    </p>
</div>

<div class="main">

    <div class="header">
        Glenn AI (ChatGPT-style demo)
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Message Glenn AI..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value.trim();
    if (!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;

    setTimeout(() => {
        let reply = getReply(text.toLowerCase());
        chat.innerHTML += `<div class="msg bot">${reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }, 500);

    input.value = "";
}

function getReply(text) {
    if (text.includes("hello") || text.includes("hi")) {
        return "Hi 👋 I'm Glenn AI. How can I help you today?";
    }

    if (text.includes("who are you")) {
        return "I am Glenn AI, your student-built AI assistant from Ghana.";
    }

    if (text.includes("study")) {
        return "Break topics into small parts and focus on understanding, not memorizing.";
    }

    return "I'm Glenn AI 🤖 — I’m improving every day to become smarter.";
}
</script>

</body>
</html>
